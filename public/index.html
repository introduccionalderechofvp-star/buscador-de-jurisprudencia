<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Sentencias</title>
  <style>
    :root {
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --surface2:   #f8fafc;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-muted: #64748b;
      --accent:     #1d4ed8;
      --accent-bg:  #eff6ff;
      --accent-bdr: #bfdbfe;
      --green-bg:   #f0fdf4;
      --green-bdr:  #bbf7d0;
      --green-text: #166534;
      --yellow-bg:  #fefce8;
      --yellow-bdr: #fef08a;
      --yellow-text:#854d0e;
      --red-bg:     #fef2f2;
      --red-bdr:    #fecaca;
      --red-text:   #991b1b;
      --shadow:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:  0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
      --radius:     12px;
      --radius-sm:  8px;
      --transition: background .2s, color .2s, border-color .2s;
    }
    [data-theme="dark"] {
      --bg:         #0f172a;
      --surface:    #1e293b;
      --surface2:   #162032;
      --border:     #334155;
      --text:       #f1f5f9;
      --text-muted: #94a3b8;
      --accent:     #60a5fa;
      --accent-bg:  #1e3a5f;
      --accent-bdr: #2563eb;
      --green-bg:   #052e16;
      --green-bdr:  #166534;
      --green-text: #86efac;
      --yellow-bg:  #1c1500;
      --yellow-bdr: #854d0e;
      --yellow-text:#fde047;
      --red-bg:     #1c0404;
      --red-bdr:    #991b1b;
      --red-text:   #fca5a5;
      --shadow:     0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md:  0 4px 6px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      transition: var(--transition);
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }

    #themeBtn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px; height: 38px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    #themeBtn:hover { border-color: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    /* ── Upload section (collapsible) ── */
    details.card summary {
      padding: 14px 18px;
      cursor: pointer;
      font-weight: 600;
      font-size: .9rem;
      color: var(--text-muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    details.card summary::-webkit-details-marker { display: none; }
    details.card summary::before {
      content: '▶';
      font-size: .65rem;
      transition: transform .2s;
    }
    details.card[open] summary::before { transform: rotate(90deg); }
    details.card[open] summary { border-bottom: 1px solid var(--border); }
    .upload-body { padding: 16px 18px; }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    /* ── Form controls ── */
    select, input[type="file"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 10px;
      font-size: .875rem;
      transition: var(--transition);
      outline: none;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 14px;
      font-size: .95rem;
      transition: var(--transition);
      outline: none;
    }
    input[type="text"]::placeholder { color: var(--text-muted); }

    button.btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    button.btn:hover { opacity: .88; }
    button.btn:disabled { opacity: .5; cursor: not-allowed; }
    button.btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

    #log {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: .78rem;
      font-family: 'Menlo', 'Consolas', monospace;
      color: var(--text-muted);
      white-space: pre-wrap;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 10px;
      display: none;
    }
    #log.visible { display: block; }

    /* ── Search section ── */
    .search-card { padding: 20px 18px 16px; }
    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .search-row input[type="text"] { flex: 1; min-width: 220px; }

    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text-muted);
      transition: var(--transition);
      user-select: none;
    }
    .toggle-pill input[type="checkbox"] { accent-color: var(--accent); }
    .toggle-pill:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
    }
    .toggle-pill .pill-sub { font-size: .75rem; opacity: .75; }

    /* ── Status / hint ── */
    #hint {
      font-size: .8rem;
      color: var(--text-muted);
      min-height: 18px;
      margin-bottom: 10px;
    }

    /* ── Expanded keywords ── */
    .keywords {
      background: var(--accent-bg);
      border: 1px solid var(--accent-bdr);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: .8rem;
      color: var(--accent);
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .keywords b { font-weight: 600; }
    .kw-tag {
      display: inline-block;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 4px;
      padding: 1px 6px;
      margin: 1px 2px;
    }

    /* ── Result cards ── */
    .result {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--surface);
      transition: var(--transition);
    }
    .result:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .result-title {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }
    .result-dl {
      font-size: .78rem;
      color: var(--accent);
      text-decoration: none;
      margin-left: 8px;
      white-space: nowrap;
    }
    .result-dl:hover { text-decoration: underline; }
    .result-organo {
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .result-text {
      font-size: .855rem;
      color: var(--text);
      opacity: .85;
      line-height: 1.6;
    }
    .result-text mark,
    .result-reason mark {
      background: var(--yellow-bg);
      color: var(--yellow-text);
      padding: 0 3px;
      border-radius: 3px;
      font-weight: 600;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .result-reason {
      font-size: .78rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }

    /* ── Score badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-high { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-bdr); }
    .badge-mid  { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-bdr); }
    .badge-low  { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .search-row { flex-direction: column; }
      .search-row select { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>Buscador de <span>Sentencias</span></h1>
  <button id="themeBtn" title="Cambiar tema" aria-label="Cambiar tema">🌙</button>
</header>

<!-- Upload (collapsible) -->
<details class="card" id="uploadSection">
  <summary>Subir sentencias</summary>
  <div class="upload-body">
    <div class="field-row">
      <select id="organoIngest">
        <option>Sala Civil - Corte Suprema de Justicia</option>
        <option>Sala Civil - Tribunal Superior de Medellín</option>
        <option>Sala Laboral - Tribunal Superior de Medellín</option>
        <option>Sala Penal - Tribunal Superior de Medellín</option>
        <option>Corte Suprema de Justicia</option>
        <option>Otro</option>
      </select>
      <input type="file" id="pdfs" multiple accept="application/pdf" />
      <button class="btn" id="btnIngest">Indexar</button>
    </div>
    <pre id="log"></pre>
  </div>
</details>

<!-- Search -->
<div class="card search-card">
  <div class="search-row">
    <input type="text" id="query" placeholder="Escribe tu consulta jurídica…" onkeydown="if(event.key==='Enter')doSearch()" />
    <select id="organoSearch">
      <option value="TODAS">Todos los órganos</option>
      <option>Sala Civil - Corte Suprema de Justicia</option>
      <option>Sala Civil - Tribunal Superior de Medellín</option>
      <option>Sala Laboral - Tribunal Superior de Medellín</option>
      <option>Sala Penal - Tribunal Superior de Medellín</option>
      <option>Corte Suprema de Justicia</option>
    </select>
    <button class="btn" id="btnSearch" onclick="doSearch()">Buscar</button>
  </div>
  <div class="toggles">
    <label class="toggle-pill">
      <input type="checkbox" id="chkAdvanced">
      Búsqueda avanzada
      <span class="pill-sub">(expansión con IA)</span>
    </label>
    <label class="toggle-pill">
      <input type="checkbox" id="chkRerank">
      Re-ranking con Claude
      <span class="pill-sub">(más preciso)</span>
    </label>
  </div>
  <div id="hint"></div>
  <div id="results"></div>
</div>

<script>
  // ── Theme ──────────────────────────────────────────────────────────────────
  const html     = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');

  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', t);
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const pref  = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || pref);
  })();

  themeBtn.onclick = () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

  // ── Upload ─────────────────────────────────────────────────────────────────
  const log     = document.getElementById('log');
  const results = document.getElementById('results');
  const hint    = document.getElementById('hint');

  document.getElementById('btnIngest').onclick = async () => {
    const files  = document.getElementById('pdfs').files;
    const organo = document.getElementById('organoIngest').value;
    if (!files.length) return alert('Selecciona al menos un PDF.');
    const form = new FormData();
    form.append('organo', organo);
    for (const f of files) form.append('pdfs', f);
    log.textContent = 'Procesando…';
    log.classList.add('visible');
    const r = await fetch('/api/ingest', { method: 'POST', body: form });
    log.textContent = JSON.stringify(await r.json(), null, 2);
  };

  // ── Search ─────────────────────────────────────────────────────────────────
  async function doSearch() {
    const query    = document.getElementById('query').value.trim();
    const organo   = document.getElementById('organoSearch').value;
    const advanced = document.getElementById('chkAdvanced').checked;
    const rerank   = document.getElementById('chkRerank').checked;
    if (!query) return;

    const btn = document.getElementById('btnSearch');
    btn.disabled = true;
    results.innerHTML = '';
    hint.innerHTML = `<span class="spinner"></span>${advanced ? 'Expandiendo consulta con Claude…' : 'Buscando…'}`;

    try {
      const r    = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, organo, limit: 20, advanced, rerank })
      });
      const data = await r.json();

      if (!data.ok) { hint.textContent = data.error || 'Error en la búsqueda.'; return; }

      let html = '';

      if (data.expanded?.length) {
        const tags = data.expanded.map(k => `<span class="kw-tag">${escHtml(k)}</span>`).join('');
        html += `<div class="keywords"><b>Términos expandidos:</b> ${tags}</div>`;
      }

      if (!data.results?.length) {
        results.innerHTML = html + '<p style="color:var(--text-muted);font-size:.9rem">Sin resultados para esta consulta.</p>';
        hint.textContent = 'Sin resultados.';
        return;
      }

      const hl = data.highlights || [];

      html += data.results.map(x => {
        const dl = x.file_path
          ? `<a class="result-dl" href="/api/download?path=${encodeURIComponent(x.file_path)}" target="_blank">⬇ PDF</a>`
          : '';

        let badge;
        if (x.claudeScore !== undefined) {
          const cls = x.claudeScore >= 7 ? 'badge-high' : x.claudeScore >= 4 ? 'badge-mid' : 'badge-low';
          badge = `<span class="badge ${cls}">${x.claudeScore}/10</span>`;
        } else {
          const p   = Math.round((x.score || 0) * 100);
          const cls = p >= 70 ? 'badge-high' : p >= 50 ? 'badge-mid' : 'badge-low';
          badge = `<span class="badge ${cls}">${p}%</span>`;
        }

        const reason = x.claudeReason
          ? `<div class="result-reason">${highlightText(x.claudeReason, hl)}</div>` : '';

        return `<div class="result">
          <div class="result-header">
            <div>
              <span class="result-title">${escHtml(x.filename)}</span>${dl}
              <div class="result-organo">${escHtml(x.organo || '')}</div>
            </div>
            ${badge}
          </div>
          <div class="result-text">${highlightText(x.text || '', hl)}</div>
          ${reason}
        </div>`;
      }).join('');

      results.innerHTML = html;
      const mode = rerank ? 'Re-ranking · ' : advanced ? 'Avanzada · ' : '';
      hint.textContent = `${mode}${data.results.length} resultado${data.results.length !== 1 ? 's' : ''}`;

    } catch (e) {
      hint.textContent = 'Error: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Resalta coincidencias de `terms` dentro de `text`, tolerante a tildes y mayúsculas.
  // Siempre escapa HTML antes de envolver con <mark> — sin riesgo de XSS.
  function highlightText(text, terms) {
    if (!text) return '';
    if (!terms?.length) return escHtml(text);

    const vowelMap = { a:'[aáàäâã]', e:'[eéèëê]', i:'[iíìïî]', o:'[oóòöô]', u:'[uúùüû]', n:'[nñ]' };
    const stripAccents = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const escapeRx = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Normalizamos el término (sin tildes, minúsculas) antes de construir el patrón,
    // así "obligación" genera un patrón que sí coincide con "OBLIGACIONES" en el texto.
    const toPattern = term => stripAccents(term.toLowerCase()).split('')
      .map(c => vowelMap[c] || escapeRx(c)).join('');

    const patterns = terms
      .filter(t => t && t.length >= 3)
      .sort((a, b) => b.length - a.length)   // términos largos primero
      .map(toPattern);

    if (!patterns.length) return escHtml(text);

    const re = new RegExp(`(${patterns.join('|')})`, 'gi');

    let out = '';
    let lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      out += escHtml(text.slice(lastIndex, m.index));
      out += `<mark>${escHtml(m[0])}</mark>`;
      lastIndex = m.index + m[0].length;
      if (m[0].length === 0) re.lastIndex++;   // evita bucle infinito
    }
    out += escHtml(text.slice(lastIndex));
    return out;
  }
</script>
</body>
</html>
